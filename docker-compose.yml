services:
  postgres:
    image: postgres:16-alpine
    container_name: apartment_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: apartment_bot
      restart: unless-stopped
      env_file: .env
      environment:
        - DB_HOST=postgres
        - PYTHONUNBUFFERED=1
      volumes:
        - bot_logs:/app/logs
      depends_on:
        postgres:
          condition: service_healthy
      logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"

volumes:
  postgres_data:
  bot_logs: