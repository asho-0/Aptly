services:
  postgres:
    image: postgres:16-alpine
    container_name: apartment_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME}
      POSTGRES_USER:     ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apartment_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfilename "appendonly.aof"
      ${REDIS_PASSWORD:+--requirepass ${REDIS_PASSWORD}}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  bot:
      build:
        context: .
        dockerfile: Dockerfile
      container_name: apartment_bot
      restart: unless-stopped
      env_file: .env
      environment:
        DB_HOST:    postgres
        REDIS_HOST: redis
      volumes:
        - bot_logs:/app/logs
      depends_on:
        postgres:
          condition: service_healthy
        redis:
          condition: service_healthy
      logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"
volumes:
  postgres_data:
  redis_data:
  bot_logs:
