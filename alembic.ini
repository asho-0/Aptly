# alembic.ini — Alembic configuration for Apartment Notifier Bot

[alembic]
# Path to migration scripts directory
script_location = app/db/migrations

# Template used to generate migration file names
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Timezone for file name timestamps
timezone = UTC

# Truncate slug of auto-generated file names to this many characters
truncate_slug_length = 40

# max length of characters to apply to the "slug" field
# in the revision filename. default is "rev"
output_encoding = utf-8

# Database URL is loaded dynamically in env.py from pydantic-settings
# (do not hardcode credentials here — use .env)
sqlalchemy.url = driver://user:password@localhost/dbname


[post_write_hooks]
# Hooks called after generated revision scripts are written to disk.
# Uncomment to auto-format with ruff:
# hooks = ruff
# ruff.type = exec
# ruff.executable = %(here)s/.venv/bin/ruff
# ruff.options = format REVISION_SCRIPT_FILENAME


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
